<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>どうぶつの すきなもの あてっこ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game" id="game">
    <div class="sky">
      <div class="sun">☀️</div>
      <div class="cloud c1">☁️</div>
      <div class="cloud c2">☁️</div>
    </div>

    <section class="top">
      <h1>すきなもの あてっこ</h1>
      <p class="sub">どうぶつの すきなものを えらぼう！</p>
    </section>

    <section class="comboBox">
      <div class="score">せいかい <span id="score">0</span></div>
      <div class="combo" id="combo">コンボ 0</div>
    </section>

    <section class="stage">
      <div class="animalWrap" id="animalWrap">
        <div class="animal" id="animal">🦁</div>
        <div class="eatText" id="eatText">パクッ！</div>
      </div>
      <div class="foodFly" id="foodFly">🍖</div>
      <div class="sparkles" id="sparkles">✨✨✨</div>
    </section>

    <section class="question">
      <div class="qAnimal" id="qAnimal">ライオンの</div>
      <div class="qText">すきなものは？</div>
      <div class="message" id="message">えらんでね</div>
      <div class="comboMessage" id="comboMessage"></div>
    </section>

    <section class="choices" id="choices"></section>

    <button class="nextBtn" id="nextBtn" type="button">つぎのもんだい</button>

    <div class="final" id="final">
      <div class="finalInner">
        <div class="big">👑✨</div>
        <div class="finalTitle">10コンボ！</div>
        <div class="finalText">すごすぎる！！</div>
        <button id="continueBtn" type="button">つづける</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
