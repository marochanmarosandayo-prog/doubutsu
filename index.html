<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>すきなものクイズ</title>
  <meta name="theme-color" content="#ffd86b" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #fff6c7 0%, #ffe3ec 48%, #dff6ff 100%);
      color: #4a3425;
      overflow-x: hidden;
      touch-action: manipulation;
    }
    .app {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 24px;
      position: relative;
    }
    .sky {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .cloud, .sun {
      position: absolute;
      font-size: 42px;
      opacity: .78;
      animation: float 5s ease-in-out infinite;
    }
    .sun { top: 22px; left: 18px; font-size: 54px; animation-duration: 7s; }
    .cloud.c1 { top: 78px; right: 28px; }
    .cloud.c2 { top: 145px; left: 28px; font-size: 36px; animation-delay: .8s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.83);
      border: 5px solid rgba(255,255,255,.95);
      border-radius: 32px;
      box-shadow: 0 14px 36px rgba(141, 96, 56, .18);
      padding: 18px 14px 16px;
      text-align: center;
      backdrop-filter: blur(6px);
    }
    h1 {
      margin: 4px 0 8px;
      font-size: clamp(28px, 8vw, 40px);
      letter-spacing: .04em;
      color: #ff7a26;
      text-shadow: 0 3px 0 #fff;
    }
    .lead {
      font-size: clamp(18px, 5vw, 25px);
      font-weight: 900;
      margin: 0 0 12px;
      color: #5b3a24;
      line-height: 1.35;
    }
    .animal-wrap {
      margin: 8px auto 4px;
      width: 188px;
      height: 188px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 38%, #ffffff 0 45%, #ffe7a6 46% 70%, transparent 71%);
      border-radius: 50%;
      transition: transform .18s ease;
    }
    .animal {
      font-size: 104px;
      filter: drop-shadow(0 8px 0 rgba(120,90,50,.12));
      transform-origin: bottom center;
    }
    .question {
      margin: 8px 0 8px;
      font-size: clamp(22px, 6vw, 31px);
      font-weight: 900;
      line-height: 1.25;
      color: #3d2d22;
    }
    .hint {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
      color: #8b6a4f;
    }
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      touch-action: manipulation;
    }
    .choice {
      min-height: 132px;
      border-radius: 28px;
      background: linear-gradient(180deg, #fff 0%, #fff3be 100%);
      box-shadow: 0 8px 0 #e7b64e, 0 14px 20px rgba(119,83,35,.18);
      border: 4px solid #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .08s ease, box-shadow .08s ease, background .18s ease;
      color: #4a3425;
    }
    .choice:active { transform: translateY(6px); box-shadow: 0 2px 0 #e7b64e, 0 7px 12px rgba(119,83,35,.14); }
    .choice .emoji { font-size: 54px; line-height: 1; }
    .choice .label { font-size: clamp(18px, 5vw, 25px); font-weight: 900; }
    .next {
      margin-top: 18px;
      width: 100%;
      min-height: 62px;
      border-radius: 24px;
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(180deg, #ff9b35, #ff6c20);
      box-shadow: 0 8px 0 #c94d10, 0 12px 22px rgba(160,73,18,.22);
      display: none;
    }
    .next:active { transform: translateY(5px); box-shadow: 0 3px 0 #c94d10; }
    .score {
      margin-top: 14px;
      font-size: 20px;
      font-weight: 900;
      color: #6d4b32;
    }
    .feedback {
      min-height: 58px;
      margin-top: 12px;
      font-size: clamp(30px, 9vw, 44px);
      font-weight: 1000;
      color: #ff5d22;
      text-shadow: 0 4px 0 #fff;
    }
    .start-cover {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: linear-gradient(180deg, #fff1a8, #ffd8e6 58%, #dff6ff);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .start-box {
      width: min(100%, 430px);
      background: rgba(255,255,255,.9);
      border: 6px solid #fff;
      border-radius: 34px;
      box-shadow: 0 18px 42px rgba(121,82,45,.22);
      padding: 24px 18px;
      text-align: center;
    }
    .start-title { font-size: 38px; margin: 0 0 8px; color: #ff7824; font-weight: 1000; }
    .start-emoji { font-size: 92px; margin: 8px 0; animation: bounce 1.1s ease-in-out infinite; }
    .start-text { font-size: 24px; font-weight: 900; line-height: 1.35; margin: 8px 0 18px; }
    .start-btn {
      width: 100%; min-height: 72px; border-radius: 28px;
      font-size: 28px; font-weight: 1000; color: white;
      background: linear-gradient(180deg, #ff9f33, #ff6422);
      box-shadow: 0 9px 0 #c64c13;
    }
    .start-btn:active { transform: translateY(6px); box-shadow: 0 3px 0 #c64c13; }
    .pop { animation: pop .42s ease; }
    .shake { animation: shake .32s ease; }
    .happy { animation: happy .55s ease; }
    @keyframes pop { 0% { transform: scale(.7); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    @keyframes happy { 0%,100% { transform: translateY(0) rotate(0); } 30% { transform: translateY(-18px) rotate(-8deg); } 70% { transform: translateY(-10px) rotate(8deg); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .confetti {
      position: fixed;
      top: -20px;
      font-size: 22px;
      z-index: 9;
      pointer-events: none;
      animation: fall 1.2s linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: .2; } }
  </style>
</head>
<body>
  <div class="sky"><div class="sun">☀️</div><div class="cloud c1">☁️</div><div class="cloud c2">☁️</div></div>

  <div class="start-cover" id="startCover">
    <div class="start-box">
      <div class="start-title">すきなもの</div>
      <div class="start-emoji">🦁</div>
      <p class="start-text">ぼくの好きなもの、<br>どーっちだ？</p>
      <button class="start-btn" id="startBtn">はじめる</button>
    </div>
  </div>

  <main class="app">
    <section class="card">
      <h1>すきなもの</h1>
      <p class="lead">ぼくの好きなもの、どーっちだ？</p>
      <div class="animal-wrap" id="animalWrap"><div class="animal" id="animal">🦁</div></div>
      <div class="question" id="question">ライオンの<br>すきなものは？</div>
      <p class="hint">えらんでね</p>
      <div class="choices">
        <button class="choice" id="choiceA"><span class="emoji"></span><span class="label"></span></button>
        <button class="choice" id="choiceB"><span class="emoji"></span><span class="label"></span></button>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next" id="nextBtn">つぎのもんだい</button>
      <div class="score" id="score">せいかい 0</div>
    </section>
  </main>

  <script>
    const quiz = [
      { animal:'🦁', name:'ライオン', correct:{emoji:'🍖',label:'おにく'}, wrong:{emoji:'🥕',label:'にんじん'} },
      { animal:'🐰', name:'うさぎ', correct:{emoji:'🥕',label:'にんじん'}, wrong:{emoji:'🍖',label:'おにく'} },
      { animal:'🐱', name:'ねこ', correct:{emoji:'🐟',label:'おさかな'}, wrong:{emoji:'🍌',label:'バナナ'} },
      { animal:'🐶', name:'いぬ', correct:{emoji:'🦴',label:'ほね'}, wrong:{emoji:'🌿',label:'はっぱ'} },
      { animal:'🐼', name:'パンダ', correct:{emoji:'🎋',label:'ささ'}, wrong:{emoji:'🍟',label:'ポテト'} },
      { animal:'🐵', name:'おさるさん', correct:{emoji:'🍌',label:'バナナ'}, wrong:{emoji:'🐟',label:'おさかな'} },
      { animal:'🐘', name:'ぞう', correct:{emoji:'🍎',label:'りんご'}, wrong:{emoji:'🧀',label:'チーズ'} },
      { animal:'🦒', name:'きりん', correct:{emoji:'🌿',label:'はっぱ'}, wrong:{emoji:'🍖',label:'おにく'} },
      { animal:'🐨', name:'コアラ', correct:{emoji:'🌿',label:'ユーカリ'}, wrong:{emoji:'🍰',label:'ケーキ'} },
      { animal:'🐧', name:'ペンギン', correct:{emoji:'🐟',label:'おさかな'}, wrong:{emoji:'🥕',label:'にんじん'} },
      { animal:'🐸', name:'かえる', correct:{emoji:'🪰',label:'むし'}, wrong:{emoji:'🍩',label:'ドーナツ'} },
      { animal:'🦋', name:'ちょうちょ', correct:{emoji:'🌸',label:'おはな'}, wrong:{emoji:'🦴',label:'ほね'} },
      { animal:'🐝', name:'はち', correct:{emoji:'🌼',label:'おはな'}, wrong:{emoji:'🍖',label:'おにく'} },
      { animal:'🐞', name:'てんとうむし', correct:{emoji:'🌿',label:'はっぱ'}, wrong:{emoji:'🍪',label:'クッキー'} },
      { animal:'🦗', name:'バッタ', correct:{emoji:'🌱',label:'くさ'}, wrong:{emoji:'🍕',label:'ピザ'} },
      { animal:'🦖', name:'きょうりゅう', correct:{emoji:'🍖',label:'おにく'}, wrong:{emoji:'🥬',label:'レタス'} },
      { animal:'🐢', name:'かめ', correct:{emoji:'🥬',label:'やさい'}, wrong:{emoji:'🍭',label:'あめ'} },
      { animal:'🐹', name:'ハムスター', correct:{emoji:'🌻',label:'ひまわりのたね'}, wrong:{emoji:'🐟',label:'おさかな'} },
      { animal:'🦊', name:'きつね', correct:{emoji:'🍇',label:'ぶどう'}, wrong:{emoji:'🎋',label:'ささ'} },
      { animal:'🐻', name:'くま', correct:{emoji:'🍯',label:'はちみつ'}, wrong:{emoji:'🧊',label:'こおり'} }
    ];

    let order = shuffle([...quiz]);
    let index = 0;
    let score = 0;
    let locked = false;
    let voicesReady = false;

    const animal = document.getElementById('animal');
    const animalWrap = document.getElementById('animalWrap');
    const question = document.getElementById('question');
    const feedback = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const choiceA = document.getElementById('choiceA');
    const choiceB = document.getElementById('choiceB');
    const nextBtn = document.getElementById('nextBtn');
    const startBtn = document.getElementById('startBtn');
    const startCover = document.getElementById('startCover');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function speak(text, rate = 1.0, pitch = 1.25) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = rate;
      u.pitch = pitch;
      u.volume = 1;
      const voices = window.speechSynthesis.getVoices();
      const jp = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang && v.lang.startsWith('ja'));
      if (jp) u.voice = jp;
      window.speechSynthesis.speak(u);
    }

    function littleSound(type) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = type === 'correct' ? 880 : 220;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
        osc.start(); osc.stop(ctx.currentTime + 0.24);
      } catch(e) {}
    }

    function setChoice(button, item, isCorrect) {
      button.querySelector('.emoji').textContent = item.emoji;
      button.querySelector('.label').textContent = item.label;
      button.onclick = () => answer(isCorrect);
    }

    function showQuestion() {
      locked = false;
      feedback.textContent = '';
      feedback.className = 'feedback';
      animalWrap.className = 'animal-wrap';
      nextBtn.style.display = 'none';
      choiceA.disabled = false; choiceB.disabled = false;
      const q = order[index];
      animal.textContent = q.animal;
      question.innerHTML = `${q.name}の<br>すきなものは？`;
      const choices = shuffle([{...q.correct, ok:true}, {...q.wrong, ok:false}]);
      setChoice(choiceA, choices[0], choices[0].ok);
      setChoice(choiceB, choices[1], choices[1].ok);
    }

    function answer(ok) {
      if (locked) return;
      locked = true;
      choiceA.disabled = true; choiceB.disabled = true;
      if (ok) {
        score++;
        feedback.textContent = 'あたり！';
        feedback.className = 'feedback pop';
        animalWrap.className = 'animal-wrap happy';
        scoreEl.textContent = `せいかい ${score}`;
        littleSound('correct');
        speak('あたり！', 1.05, 1.45);
        confetti();
      } else {
        feedback.textContent = 'ちがうよー';
        feedback.className = 'feedback shake';
        animalWrap.className = 'animal-wrap shake';
        littleSound('wrong');
        speak('ちがうよー', .95, 1.15);
      }
      nextBtn.style.display = 'block';
    }

    function next() {
      index++;
      if (index >= order.length) {
        index = 0;
        order = shuffle([...quiz]);
      }
      showQuestion();
      setTimeout(() => speak('ぼくの好きなもの、どーっちだ？', .98, 1.25), 180);
    }

    function confetti() {
      const marks = ['⭐','🎉','✨','🌈','💛'];
      for (let i = 0; i < 18; i++) {
        const s = document.createElement('div');
        s.className = 'confetti';
        s.textContent = marks[Math.floor(Math.random() * marks.length)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDelay = (Math.random() * .25) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1500);
      }
    }

    startBtn.addEventListener('click', () => {
      startCover.style.display = 'none';
      // iPhone対策：ユーザーのタップ直後に音声を開始
      speak('ぼくの好きなもの、どーっちだ？', .98, 1.25);
      showQuestion();
    });
    nextBtn.addEventListener('click', next);
    window.speechSynthesis && window.speechSynthesis.getVoices();
    if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => { voicesReady = true; };
    showQuestion();
  </script>
</body>
</html>
