<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>どうぶつの すきなもの あてっこ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game" id="game">
    <div class="bgEmoji e1">🌈</div>
    <div class="bgEmoji e2">☁️</div>
    <div class="bgEmoji e3">⭐</div>

    <header>
      <h1>すきなもの あてっこ</h1>
      <p>どうぶつさんに ごはんをあげよう！</p>
    </header>

    <section class="status">
      <div>せいかい <span id="score">0</span></div>
      <div class="combo" id="combo">れんぞく 0</div>
    </section>

    <section class="stage">
      <div class="animal" id="animal">🐰</div>
      <div class="food" id="food">🥕</div>
      <div class="nom" id="nom">もぐもぐ！</div>
      <div class="stars" id="stars">✨⭐✨</div>
    </section>

    <section class="question">
      <div class="q1" id="qAnimal">うさぎの</div>
      <div class="q2">すきなものは？</div>
      <div class="msg" id="msg">タッチしてね</div>
      <div class="comboMsg" id="comboMsg"></div>
    </section>

    <section class="choices" id="choices"></section>

    <div class="party" id="party">
      <div class="partyBox">
        <div class="partyEmoji">🎉🐰🎉</div>
        <div class="partyTitle">すごい！</div>
        <div class="partyText">10かい れんぞく！</div>
        <button id="partyBtn">もういっかい</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
